<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Bulat Merah Khas PicShare -->
  <circle cx="50" cy="50" r="48" fill="#dc2626" />
  
  <!-- Icon Kamera & Share Putih -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Badan Kamera -->
    <path d="M30 40h40c2.2 0 4 1.8 4 4v26c0 2.2-1.8 4-4 4H30c-2.2 0-4-1.8-4-4V44c0-2.2 1.8-4 4-4z" />
    <!-- Dudukan Flash -->
    <path d="M42 40v-4h16v4" />
    <!-- Lensa (Lingkaran Tengah) -->
    <circle cx="50" cy="57" r="11" />
    <!-- Efek Flash/Shine -->
    <circle cx="66" cy="48" r="2" fill="#ffffff" stroke="none" />
  </g>
  <!-- Simbol Share Melengkung di Pojok Atas -->
  <path d="M68 24c4.4 0 8 3.6 8 8s-3.6 8-8 8-8-3.6-8-8 3.6-8 8-8zm-5.5 13.5l-9 9" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
</svg>
